name: Update Player Map

on:
  schedule:
    # Runs at 12:00 AM UTC every Tuesday
    - cron: "0 0 * * 2"
  workflow_dispatch: # Allows you to manually trigger the workflow from GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Matches a typical supported version

      - name: Create data directory
        run: mkdir -p data

      - name: Download SFBB Database
        run: |
          # The direct download URL for the CSV from Smart Fantasy Baseball
          curl -L "https://www.smartfantasybaseball.com/PLAYERIDMAPCSV" -o "data/SFBB Player ID Map - PLAYERIDMAP.csv"

      - name: Run Map Generator
        run: |
          cd scripts
          python generate_map.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add "fantrax-extension/player_map.json"
          git add "data/SFBB Player ID Map - PLAYERIDMAP.csv"
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: Auto-update player_map.json from SFBB CSV"
          git push
