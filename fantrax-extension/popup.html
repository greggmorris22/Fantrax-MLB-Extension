<!DOCTYPE html>
<html>

<head>
    <title>Fantrax Linker</title>
    <!-- 
      This <style> block dictates the look of the tiny popup window 
      that appears when you click the extension icon in Chrome's toolbar. 
      It is entirely separate from the styles.css file (which handles 
      the injected buttons on the actual Fantrax page). 
    -->
    <style>
        body {
            width: 200px;
            padding: 10px;
            font-family: sans-serif;
            background-color: #f8f9fa;
        }

        h1 {
            font-size: 16px;
            margin-top: 0;
            color: #333;
        }

        .status {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .legend {
            font-size: 12px;
            border-top: 1px solid #ddd;
            padding-top: 8px;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .diamond {
            width: 8px;
            height: 8px;
            transform: rotate(45deg);
            margin-right: 12px;
            margin-left: 4px;
        }

        .green {
            background-color: #28a745;
        }

        .blue {
            background: linear-gradient(90deg, #0000ff 50%, #ff0000 50%);
            border-radius: 50%;
            transform: none;
        }

    </style>
</head>

<body>
    <!-- Main Title -->
    <h1>Fantrax Linker</h1>
    
    <!-- Status message -->
    <div class="status">Extension is active.</div>
    
    <!-- Legend explaining what the icons mean -->
    <div class="legend">
        <div class="item">
            <div class="diamond green"></div>
            <span>Fangraphs</span>
        </div>
        <div class="item">
            <div class="diamond blue"></div>
            <span>Baseball Savant</span>
        </div>
    </div>
</body>

</html>
