<!DOCTYPE html>
<html>

<head>
    <title>Fantrax Linker</title>
    <style>
        body {
            width: 200px;
            padding: 10px;
            font-family: sans-serif;
            background-color: #f8f9fa;
        }

        h1 {
            font-size: 16px;
            margin-top: 0;
            color: #333;
        }

        .status {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .legend {
            font-size: 12px;
            border-top: 1px solid #ddd;
            padding-top: 8px;
        }

        .item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .diamond {
            width: 8px;
            height: 8px;
            transform: rotate(45deg);
            margin-right: 12px;
            margin-left: 4px;
        }

        .green {
            background-color: #28a745;
        }

        .blue {
            background: linear-gradient(90deg, #0000ff 50%, #ff0000 50%);
            border-radius: 50%;
            transform: none;
        }

        /* Teal */
    </style>
</head>

<body>
    <h1>Fantrax Linker</h1>
    <div class="status">Extension is active.</div>
    <div class="legend">
        <div class="item">
            <div class="diamond green"></div>
            <span>Fangraphs</span>
        </div>
        <div class="item">
            <div class="diamond blue"></div>
            <span>Baseball Savant</span>
        </div>
    </div>
</body>

</html>
